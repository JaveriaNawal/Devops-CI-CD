# ============================================================
#  Template: steps-deploy-frontend-appservice.yml
#  Purpose : Deploy Frontend Docker image to Azure App Service
# ============================================================

parameters:
  - name: acrLoginServer
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
  - name: appServiceName
    type: string
  - name: resourceGroup
    type: string
  - name: environment
    type: string
    default: "staging"
  - name: keyVaultName
    type: string

steps:
  - task: AzureCLI@2
    displayName: "Configure container — ${{ parameters.appServiceName }}"
    inputs:
      azureSubscription: "azure-service-connection"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az webapp config container set \
          --name "${{ parameters.appServiceName }}" \
          --resource-group "${{ parameters.resourceGroup }}" \
          --docker-custom-image-name "${{ parameters.acrLoginServer }}/${{ parameters.imageName }}:${{ parameters.imageTag }}" \
          --docker-registry-server-url "https://${{ parameters.acrLoginServer }}"

  - task: AzureCLI@2
    displayName: "Set App Service settings"
    inputs:
      azureSubscription: "azure-service-connection"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az webapp config appsettings set \
          --name "${{ parameters.appServiceName }}" \
          --resource-group "${{ parameters.resourceGroup }}" \
          --settings \
            NODE_ENV="${{ parameters.environment }}" \
            VITE_API_BASE_URL="https://taskapp-staging-backend.azurewebsites.net"

  - task: AzureAppServiceManage@0
    displayName: "Restart App Service"
    inputs:
      azureSubscription: "azure-service-connection"
      Action: "Restart Azure App Service"
      WebAppName: "${{ parameters.appServiceName }}"
      ResourceGroupName: "${{ parameters.resourceGroup }}"

  - script: |
      echo "Waiting 30s for boot..."
      sleep 30
      APP_URL="https://${{ parameters.appServiceName }}.azurewebsites.net"
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
      if [ "$HTTP_STATUS" != "200" ]; then
        echo "##vso[task.logissue type=error]Health check FAILED — HTTP $HTTP_STATUS"
        exit 1
      fi
      echo "✅ Frontend is UP at $APP_URL"
    displayName: "Smoke test — Frontend"
