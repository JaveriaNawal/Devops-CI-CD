# ============================================================
#  Template: steps-notify.yml
#  Purpose : Send pipeline success/failure notifications via
#            email (SendGrid) and optional Teams webhook.
# ============================================================

parameters:
  - name: notificationEmail
    type: string
  - name: pipelineStatus
    type: string
    default: "Unknown"
  - name: buildId
    type: string
  - name: repositoryName
    type: string
  - name: branchName
    type: string

steps:
  # ── 1. Determine final pipeline status ────────────────────
  - script: |
      OVERALL_STATUS="${{ parameters.pipelineStatus }}"

      # Map Azure DevOps job result to human-readable status
      case "$OVERALL_STATUS" in
        "Succeeded"|"SucceededWithIssues")
          echo "##vso[task.setvariable variable=STATUS_EMOJI]✅"
          echo "##vso[task.setvariable variable=STATUS_TEXT]SUCCEEDED"
          echo "##vso[task.setvariable variable=STATUS_COLOR]good"
          ;;
        "Failed")
          echo "##vso[task.setvariable variable=STATUS_EMOJI]❌"
          echo "##vso[task.setvariable variable=STATUS_TEXT]FAILED"
          echo "##vso[task.setvariable variable=STATUS_COLOR]danger"
          ;;
        "Canceled")
          echo "##vso[task.setvariable variable=STATUS_EMOJI]⚠️"
          echo "##vso[task.setvariable variable=STATUS_TEXT]CANCELED"
          echo "##vso[task.setvariable variable=STATUS_COLOR]warning"
          ;;
        *)
          echo "##vso[task.setvariable variable=STATUS_EMOJI]❓"
          echo "##vso[task.setvariable variable=STATUS_TEXT]UNKNOWN"
          echo "##vso[task.setvariable variable=STATUS_COLOR]warning"
          ;;
      esac
    displayName: "Evaluate pipeline status"

  # ── 2. Post to Microsoft Teams webhook ────────────────────
  - script: |
      PIPELINE_URL="$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=${{ parameters.buildId }}"

      PAYLOAD=$(cat <<EOF
      {
        "@type": "MessageCard",
        "@context": "http://schema.org/extensions",
        "themeColor": "$(STATUS_COLOR == 'good' && echo '00FF00' || echo 'FF0000')",
        "summary": "Pipeline ${{ parameters.buildId }} — $(STATUS_TEXT)",
        "sections": [{
          "activityTitle": "$(STATUS_EMOJI) Pipeline **$(STATUS_TEXT)**",
          "activitySubtitle": "Repo: ${{ parameters.repositoryName }} | Branch: ${{ parameters.branchName }}",
          "facts": [
            { "name": "Build ID", "value": "${{ parameters.buildId }}" },
            { "name": "Branch",   "value": "${{ parameters.branchName }}" },
            { "name": "Status",   "value": "$(STATUS_TEXT)" },
            { "name": "Time",     "value": "$(date -u)" }
          ],
          "markdown": true
        }],
        "potentialAction": [{
          "@type": "OpenUri",
          "name": "View Pipeline",
          "targets": [{ "os": "default", "uri": "$PIPELINE_URL" }]
        }]
      }
      EOF
      )

      # Only post if TEAMS_WEBHOOK_URL is set (optional Teams integration)
      if [ -n "$(TEAMS_WEBHOOK_URL)" ]; then
        curl -s -X POST "$(TEAMS_WEBHOOK_URL)" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"
        echo "Teams notification sent."
      else
        echo "TEAMS_WEBHOOK_URL not configured — skipping Teams notification."
      fi
    displayName: "Notify — Microsoft Teams"
    continueOnError: true
    env:
      TEAMS_WEBHOOK_URL: $(TEAMS-WebhookUrl)   # optional, from Key Vault

  # ── 3. Send email via SendGrid ────────────────────────────
  - script: |
      PIPELINE_URL="$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=${{ parameters.buildId }}"

      curl -s -X POST https://api.sendgrid.com/v3/mail/send \
        -H "Authorization: Bearer $(SENDGRID-ApiKey)" \
        -H "Content-Type: application/json" \
        -d "{
          \"personalizations\": [{
            \"to\": [{\"email\": \"${{ parameters.notificationEmail }}\"}],
            \"subject\": \"[Pipeline] $(STATUS_EMOJI) Build #${{ parameters.buildId }} — $(STATUS_TEXT)\"
          }],
          \"from\": {\"email\": \"devops-noreply@yourcompany.com\"},
          \"content\": [{
            \"type\": \"text/html\",
            \"value\": \"<h2>$(STATUS_EMOJI) Pipeline $(STATUS_TEXT)</h2><ul><li><b>Build:</b> ${{ parameters.buildId }}</li><li><b>Branch:</b> ${{ parameters.branchName }}</li><li><b>Repo:</b> ${{ parameters.repositoryName }}</li></ul><a href='$PIPELINE_URL'>View Pipeline Details</a>\"
          }]
        }"

      echo "Email notification sent to ${{ parameters.notificationEmail }}"
    displayName: "Notify — Email (SendGrid)"
    continueOnError: true
    env:
      SENDGRID_API_KEY: $(SENDGRID-ApiKey)    # from Key Vault
