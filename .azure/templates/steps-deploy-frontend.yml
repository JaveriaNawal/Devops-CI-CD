# ============================================================
#  Template: steps-deploy-frontend.yml
#  Purpose : Deploy React static build to Azure Static Web App
#            using the SWA CLI and deployment token.
# ============================================================

parameters:
  - name: swaName
    type: string
  - name: deploymentToken
    type: string    # secret from Key Vault
  - name: artifactName
    type: string
    default: "frontend-dist"
  - name: environment
    type: string
    default: "staging"

steps:
  # ── 1. Download published artifact ────────────────────────
  - task: DownloadPipelineArtifact@2
    displayName: "Download frontend dist artifact"
    inputs:
      artifactName: "${{ parameters.artifactName }}"
      targetPath: "$(Pipeline.Workspace)/frontend-dist"

  # ── 2. Install SWA CLI ────────────────────────────────────
  - script: npm install -g @azure/static-web-apps-cli
    displayName: "Install Azure SWA CLI"

  # ── 3. Deploy to Static Web Apps ─────────────────────────
  - script: |
      swa deploy \
        --app-location "$(Pipeline.Workspace)/frontend-dist" \
        --deployment-token "${{ parameters.deploymentToken }}" \
        --env "${{ parameters.environment }}"
    displayName: "SWA Deploy — ${{ parameters.swaName }} (${{ parameters.environment }})"
    env:
      # Token never echoed to console
      SWA_CLI_DEPLOYMENT_TOKEN: "${{ parameters.deploymentToken }}"

  # ── 4. Purge CDN cache after deploy ──────────────────────
  - task: AzureCLI@2
    displayName: "Purge CDN / SWA cache"
    inputs:
      azureSubscription: "azure-service-connection"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        # Optional: only needed if you have a Front Door or CDN in front of SWA
        echo "Purging CDN cache for ${{ parameters.swaName }}..."
        az staticwebapp environment list \
          --name "${{ parameters.swaName }}" \
          --query "[].hostname" -o tsv | head -1

        echo "✅ Static Web App deployed successfully to ${{ parameters.environment }}"
    continueOnError: true
