# ============================================================
#  Template: steps-node-setup.yml
#  Purpose : Install Node, restore npm cache, run npm ci
#  Usage   : referenced by all jobs needing Node + npm deps
# ============================================================

parameters:
  - name: workingDirectory
    type: string
    default: "."
  - name: nodeVersion
    type: string
    default: "20.x"
  - name: cacheKey
    type: string
  - name: cachePath
    type: string

steps:
  # ── 1. Pin Node.js version ─────────────────────────────────
  - task: NodeTool@0
    displayName: "Install Node.js ${{ parameters.nodeVersion }}"
    inputs:
      versionSpec: "${{ parameters.nodeVersion }}"

  # ── 2. Restore npm cache ───────────────────────────────────
  #  Cache is keyed on the OS + package-lock.json hash.
  #  On a cache hit the node_modules folder is restored and
  #  npm ci is skipped (via the cacheRestored output variable).
  - task: Cache@2
    displayName: "Cache npm packages — ${{ parameters.workingDirectory }}"
    inputs:
      key: '${{ parameters.cacheKey }}'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: "${{ parameters.cachePath }}"
    name: npmCache

  # ── 3. Install dependencies (only on cache miss) ───────────
  - script: npm ci --prefer-offline --no-audit
    workingDirectory: "${{ parameters.workingDirectory }}"
    displayName: "npm ci — ${{ parameters.workingDirectory }}"
    condition: ne(variables['npmCache.cacheHit'], 'true')
    env:
      NODE_ENV: development
