# ============================================================
#  Template: steps-deploy-backend.yml
#  Purpose : Deploy Docker image to Azure App Service,
#            run database migrations, and perform smoke test.
# ============================================================

parameters:
  - name: acrLoginServer
    type: string
  - name: imageName
    type: string
  - name: imageTag
    type: string
  - name: appServiceName
    type: string
  - name: resourceGroup
    type: string
  - name: keyVaultName
    type: string
  - name: sqlConnectionString
    type: string    # secret from Key Vault
  - name: environment
    type: string
    default: "staging"

steps:
  # ── 1. Azure CLI Login (uses service connection) ──────────
  - task: AzureCLI@2
    displayName: "Azure Login & Set Subscription"
    inputs:
      azureSubscription: "azure-service-connection"   # ← your service connection name
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az account show
        echo "Logged into Azure successfully"

  # ── 2. Configure App Service container settings ───────────
  - task: AzureCLI@2
    displayName: "Configure container on App Service — ${{ parameters.appServiceName }}"
    inputs:
      azureSubscription: "azure-service-connection"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az webapp config container set \
          --name "${{ parameters.appServiceName }}" \
          --resource-group "${{ parameters.resourceGroup }}" \
          --docker-custom-image-name "${{ parameters.acrLoginServer }}/${{ parameters.imageName }}:${{ parameters.imageTag }}" \
          --docker-registry-server-url "https://${{ parameters.acrLoginServer }}"

        echo "Container image updated to ${{ parameters.imageTag }}"

  # ── 3. Inject environment variables / secrets ─────────────
  - task: AzureCLI@2
    displayName: "Set App Service environment variables"
    inputs:
      azureSubscription: "azure-service-connection"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az webapp config appsettings set \
          --name "${{ parameters.appServiceName }}" \
          --resource-group "${{ parameters.resourceGroup }}" \
          --settings \
            NODE_ENV="${{ parameters.environment }}" \
            BUILD_ID="$(Build.BuildId)" \
            BRANCH_NAME="$(Build.SourceBranchName)" \
            APP_VERSION="$(Build.BuildId)" \
            APPLICATIONINSIGHTS_CONNECTION_STRING="@Microsoft.KeyVault(SecretUri=https://${{ parameters.keyVaultName }}.vault.azure.net/secrets/AppInsights-ConnectionString/)" \
            SQL_CONNECTION_STRING="@Microsoft.KeyVault(SecretUri=https://${{ parameters.keyVaultName }}.vault.azure.net/secrets/SQL-ConnectionString/)" \
            JWT_SECRET="@Microsoft.KeyVault(SecretUri=https://${{ parameters.keyVaultName }}.vault.azure.net/secrets/JWT-Secret/)"
      # NOTE: secrets are referenced via Key Vault references,
      # never injected as plaintext into app settings.

  # ── 4. Run database migrations ────────────────────────────
  - task: AzureCLI@2
    displayName: "Run DB migrations via App Service console"
    inputs:
      azureSubscription: "azure-service-connection"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        echo "Triggering migration via kudu REST API..."
        az webapp ssh --name "${{ parameters.appServiceName }}" \
                      --resource-group "${{ parameters.resourceGroup }}" \
                      --timeout 120 \
                      --command "cd /app && node dist/migrations/run-migrations.js"
    continueOnError: false

  # ── 5. Restart App Service ────────────────────────────────
  - task: AzureAppServiceManage@0
    displayName: "Restart App Service — ${{ parameters.appServiceName }}"
    inputs:
      azureSubscription: "azure-service-connection"
      Action: "Restart Azure App Service"
      WebAppName: "${{ parameters.appServiceName }}"
      ResourceGroupName: "${{ parameters.resourceGroup }}"

  # ── 6. Health check / smoke test ─────────────────────────
  - script: |
      echo "Waiting 30s for service to boot..."
      sleep 30

      APP_URL="https://${{ parameters.appServiceName }}.azurewebsites.net"
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health")

      echo "Health check status: $HTTP_STATUS"

      if [ "$HTTP_STATUS" != "200" ]; then
        echo "##vso[task.logissue type=error]Health check FAILED — HTTP $HTTP_STATUS"
        echo "##vso[task.complete result=Failed;]Health check FAILED"
        exit 1
      fi

      echo "✅ Health check passed for $APP_URL"
    displayName: "Smoke test — /api/health"

  # ── 7. Tag the deployment in Azure Monitor ────────────────
  - task: AzureCLI@2
    displayName: "Tag deployment in resource group"
    inputs:
      azureSubscription: "azure-service-connection"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az webapp update \
          --name "${{ parameters.appServiceName }}" \
          --resource-group "${{ parameters.resourceGroup }}" \
          --set tags.lastDeployBuild="$(Build.BuildId)" \
               tags.lastDeployBranch="$(Build.SourceBranchName)" \
               tags.lastDeployTime="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
