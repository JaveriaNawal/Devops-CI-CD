# ============================================================
#  Template: steps-docker-build-push.yml
#  Purpose : Build Docker image with BuildKit, scan for
#            vulnerabilities with Trivy, and push to ACR.
# ============================================================

parameters:
  - name: imageName
    type: string
  - name: imageTag
    type: string
  - name: dockerfilePath
    type: string
    default: "Dockerfile"
  - name: buildContext
    type: string
    default: "."
  - name: acrName
    type: string
  - name: acrLoginServer
    type: string
  - name: acrPassword
    type: string    # secret injected from Key Vault variable group

steps:
  # ── 1. Log in to Azure Container Registry ─────────────────
  - task: Docker@2
    displayName: "ACR Login"
    inputs:
      command: "login"
      containerRegistry: "${{ parameters.acrName }}"   # ACR service connection

  # ── 2. Build image (BuildKit enabled) ─────────────────────
  - task: Docker@2
    displayName: "Docker Build — ${{ parameters.imageName }}:${{ parameters.imageTag }}"
    inputs:
      command: "build"
      dockerfile: "${{ parameters.dockerfilePath }}"
      buildContext: "${{ parameters.buildContext }}"
      repository: "${{ parameters.imageName }}"
      tags: |
        ${{ parameters.imageTag }}
        latest
      arguments: >
        --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        --build-arg VCS_REF=$(Build.SourceVersion)
        --build-arg VERSION=$(Build.BuildId)
        --cache-from ${{ parameters.acrLoginServer }}/${{ parameters.imageName }}:latest
    env:
      DOCKER_BUILDKIT: 1

  # ── 3. Trivy vulnerability scan ───────────────────────────
  - script: |
      echo "Installing Trivy security scanner..."
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      echo "Scanning image for HIGH/CRITICAL vulnerabilities..."
      trivy image \
        --exit-code 1 \
        --severity HIGH,CRITICAL \
        --no-progress \
        --format table \
        "${{ parameters.acrLoginServer }}/${{ parameters.imageName }}:${{ parameters.imageTag }}"
    displayName: "Trivy — Container vulnerability scan"
    continueOnError: false   # Set to true during initial rollout if needed

  # ── 4. Push image to ACR ──────────────────────────────────
  - task: Docker@2
    displayName: "Docker Push — ${{ parameters.imageName }}"
    inputs:
      command: "push"
      repository: "${{ parameters.imageName }}"
      tags: |
        ${{ parameters.imageTag }}
        latest

  # ── 5. Output image digest for traceability ───────────────
  - script: |
      DIGEST=$(docker inspect \
        --format='{{index .RepoDigests 0}}' \
        "${{ parameters.acrLoginServer }}/${{ parameters.imageName }}:${{ parameters.imageTag }}")
      echo "##vso[task.setvariable variable=IMAGE_DIGEST;isOutput=true]$DIGEST"
      echo "Image digest: $DIGEST"
    displayName: "Capture image digest"
    name: captureDigest
